services:
  - type: web
    name: contextguard-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # You will paste this in the Render dashboard manually
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
    healthCheckPath: /
    autoDeploy: true
